name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing release tag or commit to build"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/budgetanalyzer/transaction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Verify release inputs
        id: release
        shell: bash
        env:
          SERVICE_COMMON_PACKAGES_USERNAME: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          SERVICE_COMMON_PACKAGES_READ_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          release_ref="${{ inputs.release_ref || github.ref_name }}"
          release_name="${release_ref##refs/tags/}"
          version="${release_name#v}"
          if [[ -z "${version}" || "${version}" == "${release_name}" ]]; then
            echo "Expected a v-prefixed release ref, got ${release_ref}." >&2
            exit 1
          fi

          service_common_version="$(sed -nE 's/^serviceCommon = "([^"]+)"$/\1/p' gradle/libs.versions.toml | head -n1)"
          if [[ -z "${service_common_version}" ]]; then
            echo "Could not read serviceCommon from gradle/libs.versions.toml." >&2
            exit 1
          fi

          if [[ "${service_common_version}" != "${version}" ]]; then
            echo "Release ref ${release_ref} does not match serviceCommon version ${service_common_version}." >&2
            exit 1
          fi

          if [[ -z "${SERVICE_COMMON_PACKAGES_USERNAME}" || -z "${SERVICE_COMMON_PACKAGES_READ_TOKEN}" ]]; then
            echo "Missing SERVICE_COMMON_PACKAGES_USERNAME or SERVICE_COMMON_PACKAGES_READ_TOKEN." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve checked-out revision
        id: source
        shell: bash
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight GitHub Packages access
        shell: bash
        env:
          GITHUB_ACTOR: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"

          for artifact in service-core service-web; do
            url="https://maven.pkg.github.com/budgetanalyzer/service-common/org/budgetanalyzer/${artifact}/${version}/${artifact}-${version}.pom"
            echo "Preflighting ${artifact} ${version} via GitHub Packages"
            curl -fsSL \
              -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" \
              -o /dev/null \
              -w "final_http=%{http_code}\n" \
              "${url}"
          done

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.commit_sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          secrets: |
            github_actor=${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
            github_token=${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}

      - name: Print digest-pinned reference
        shell: bash
        run: |
          echo "${IMAGE_NAME}:${{ steps.release.outputs.version }}@${{ steps.build.outputs.digest }}"
