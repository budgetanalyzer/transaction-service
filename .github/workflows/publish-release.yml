name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing Git ref to build; SemVer tags publish X.Y.Z by default"
        required: true
        type: string
      docker_label:
        description: "Optional Docker tag label for an ad hoc manual image; never use latest"
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/budgetanalyzer/transaction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_ref || github.ref_name }}
          fetch-depth: 0

      - name: Resolve release inputs
        id: release
        shell: bash
        env:
          REQUESTED_RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_ref || github.ref_name }}
          REQUESTED_DOCKER_LABEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.docker_label || '' }}
          SERVICE_COMMON_PACKAGES_USERNAME: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          SERVICE_COMMON_PACKAGES_READ_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          release_ref="${REQUESTED_RELEASE_REF}"
          requested_docker_label="${REQUESTED_DOCKER_LABEL}"

          if [[ -z "${release_ref}" ]]; then
            echo "release_ref is required." >&2
            exit 1
          fi

          if [[ "${release_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            default_docker_label="${release_ref#v}"
          else
            default_docker_label=""
          fi

          if [[ "${event_name}" == "push" ]]; then
            if [[ -z "${default_docker_label}" ]]; then
              echo "Release tag pushes must use SemVer tags like v1.2.3, got ${release_ref}." >&2
              exit 1
            fi
            if [[ -n "${requested_docker_label}" ]]; then
              echo "docker_label is only supported for workflow_dispatch." >&2
              exit 1
            fi
          fi

          if [[ "${event_name}" == "workflow_dispatch" && -z "${default_docker_label}" && -z "${requested_docker_label}" ]]; then
            echo "workflow_dispatch release_ref is not a SemVer release tag, so docker_label is required." >&2
            exit 1
          fi

          docker_label="${requested_docker_label:-${default_docker_label}}"
          if [[ ! "${docker_label}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ || "${docker_label}" == "latest" ]]; then
            echo "Resolved docker_label is not Docker-safe or is disallowed: ${docker_label}." >&2
            exit 1
          fi

          if [[ -z "${SERVICE_COMMON_PACKAGES_USERNAME}" || -z "${SERVICE_COMMON_PACKAGES_READ_TOKEN}" ]]; then
            echo "Missing SERVICE_COMMON_PACKAGES_USERNAME or SERVICE_COMMON_PACKAGES_READ_TOKEN." >&2
            exit 1
          fi

          echo "docker_label=${docker_label}" >> "${GITHUB_OUTPUT}"

      - name: Resolve checked-out revision
        id: source
        shell: bash
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.docker_label }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.commit_sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.docker_label }}
          secrets: |
            github_actor=${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
            github_token=${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}

      - name: Print digest-pinned reference
        shell: bash
        run: |
          echo "${IMAGE_NAME}:${{ steps.release.outputs.docker_label }}@${{ steps.build.outputs.digest }}"
