name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/budgetanalyzer/transaction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify release inputs
        id: release
        shell: bash
        env:
          SERVICE_COMMON_PACKAGES_USERNAME: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          SERVICE_COMMON_PACKAGES_READ_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ -z "${version}" || "${version}" == "${GITHUB_REF_NAME}" ]]; then
            echo "Expected a v-prefixed release tag, got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          service_common_version="$(sed -nE 's/^serviceCommon = "([^"]+)"$/\1/p' gradle/libs.versions.toml | head -n1)"
          if [[ -z "${service_common_version}" ]]; then
            echo "Could not read serviceCommon from gradle/libs.versions.toml." >&2
            exit 1
          fi

          if [[ "${service_common_version}" != "${version}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match serviceCommon version ${service_common_version}." >&2
            exit 1
          fi

          if [[ -z "${SERVICE_COMMON_PACKAGES_USERNAME}" || -z "${SERVICE_COMMON_PACKAGES_READ_TOKEN}" ]]; then
            echo "Missing SERVICE_COMMON_PACKAGES_USERNAME or SERVICE_COMMON_PACKAGES_READ_TOKEN." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          secrets: |
            github_actor=${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
            github_token=${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}

      - name: Print digest-pinned reference
        shell: bash
        run: |
          echo "${IMAGE_NAME}:${{ steps.release.outputs.version }}@${{ steps.build.outputs.digest }}"
