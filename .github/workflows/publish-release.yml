name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing release tag to build"
        required: true
        type: string
      image_tag:
        description: "Published image tag override"
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/budgetanalyzer/transaction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref_name }}
          fetch-depth: 0

      - name: Resolve release inputs
        id: release
        shell: bash
        env:
          SERVICE_COMMON_PACKAGES_USERNAME: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          SERVICE_COMMON_PACKAGES_READ_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          release_ref="${{ inputs.release_ref || github.ref_name }}"
          requested_image_tag="${{ inputs.image_tag || '' }}"

          if [[ -z "${release_ref}" ]]; then
            echo "release_ref is required." >&2
            exit 1
          fi

          if [[ "${event_name}" == "workflow_dispatch" ]]; then
            if ! git show-ref --verify --quiet "refs/tags/${release_ref}"; then
              echo "workflow_dispatch release_ref must be an existing Git tag, got ${release_ref}." >&2
              exit 1
            fi
          fi

          if [[ -n "${requested_image_tag}" ]]; then
            image_tag="${requested_image_tag}"
          elif [[ "${release_ref}" == v* ]]; then
            image_tag="${release_ref#v}"
          else
            image_tag="${release_ref}"
          fi

          if [[ -z "${image_tag}" ]]; then
            echo "Resolved image_tag is empty." >&2
            exit 1
          fi

          service_common_version="$(sed -nE 's/^serviceCommon = "([^"]+)"$/\1/p' gradle/libs.versions.toml | head -n1)"
          if [[ -z "${service_common_version}" ]]; then
            echo "Could not read serviceCommon from gradle/libs.versions.toml." >&2
            exit 1
          fi

          if [[ -z "${SERVICE_COMMON_PACKAGES_USERNAME}" || -z "${SERVICE_COMMON_PACKAGES_READ_TOKEN}" ]]; then
            echo "Missing SERVICE_COMMON_PACKAGES_USERNAME or SERVICE_COMMON_PACKAGES_READ_TOKEN." >&2
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "service_common_version=${service_common_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve checked-out revision
        id: source
        shell: bash
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight GitHub Packages access
        shell: bash
        env:
          GITHUB_ACTOR: ${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.service_common_version }}"

          for artifact in service-core service-web; do
            url="https://maven.pkg.github.com/budgetanalyzer/service-common/org/budgetanalyzer/${artifact}/${version}/${artifact}-${version}.pom"
            echo "Preflighting ${artifact} ${version} via GitHub Packages"
            curl -fsSL \
              -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" \
              -o /dev/null \
              -w "final_http=%{http_code}\n" \
              "${url}"
          done

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.commit_sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.image_tag }}
          secrets: |
            github_actor=${{ secrets.SERVICE_COMMON_PACKAGES_USERNAME }}
            github_token=${{ secrets.SERVICE_COMMON_PACKAGES_READ_TOKEN }}

      - name: Print digest-pinned reference
        shell: bash
        run: |
          echo "${IMAGE_NAME}:${{ steps.release.outputs.image_tag }}@${{ steps.build.outputs.digest }}"
