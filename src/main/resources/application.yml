server:
  servlet:
    context-path: /transaction-service
  port: 8082

logging:
  level:
    root: WARN
    org.budgetanalyzer: TRACE

spring:
  application:
    name: transaction-service

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null  # Exclude null fields from JSON
    serialization:
      indent-output: true                 # Pretty print JSON
      write-dates-as-timestamps: false    # Use ISO-8601 format for dates
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat

  datasource:
    url: jdbc:postgresql://localhost:5432/budget_analyzer
    username: ${SPRING_DATASOURCE_USERNAME:transaction_service}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema, JPA validates it matches entities
    show-sql: false


  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

budgetanalyzer:
  service:
    http-logging:
      enabled: true
      log-level: DEBUG
      include-request-body: true
      include-response-body: true
      max-body-size: 10000
      # Default exclude-patterns: /actuator/**, /swagger-ui/**, /v3/api-docs/**
